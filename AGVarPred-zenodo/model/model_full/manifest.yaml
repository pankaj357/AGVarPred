notes: |
  This is the primary production model. It was trained on ClinVar germline
  variants (GRCh38) labeled Pathogenic or Benign, using 120 selected features
  composed of AlphaGenome functional genomic scores, gnomAD allele frequency,
  and VEP-derived annotations. The final estimator is a regularized LightGBM
  classifier, calibrated with isotonic regression and threshold-tuned on the
  calibration set to maximize F1.
